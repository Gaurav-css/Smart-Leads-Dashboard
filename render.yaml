services:
  # ─── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: smart-leads-api
    runtime: node

    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard (use MongoDB Atlas)
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard (strong random string)
      - key: ADMIN_REGISTRATION_KEY
        sync: false # Set this in Render Dashboard
      - key: CLIENT_ORIGIN
        value: https://smart-leads-dashboard.onrender.com # Update this after frontend is live

  # ─── Frontend Client (Static Site) ──────────────────────────────────────────
  - type: web
    name: smart-leads-dashboard
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    envVars:
      - key: VITE_API_BASE_URL
        value: https://smart-leads-api.onrender.com/api # Link to your backend service
    routes:
      - type: rewrite
        source: /*
        destination: /index.html # Handles React Router SPA routing
