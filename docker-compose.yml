services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-server
    environment:
      NODE_ENV: ${SERVER_NODE_ENV:-production}
      PORT: ${SERVER_PORT:-5000}
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongodb:27017/smart_leads}
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      ADMIN_REGISTRATION_KEY: ${ADMIN_REGISTRATION_KEY:-optional_admin_key}
    ports:
      - "${SERVER_PORT:-5000}:5000"
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    container_name: smart-leads-client
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data:
